services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-hemo-api
    privileged: true
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENBLAS_NUM_THREADS=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
    volumes:
      - ./data:/app/data
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    restart: unless-stopped
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          memory: 4G